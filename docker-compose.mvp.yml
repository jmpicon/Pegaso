networks:
  pegaso-net:
    driver: bridge

services:

  # ============================================================
  # LLM ENGINE — Fox (Ferrumox) corre en el HOST, no en Docker
  # glibc 2.39 del host (Ubuntu 24.04) es requerida por el binario
  # Arrancar con: make fox  →  http://localhost:11436/v1
  # ============================================================

  # ============================================================
  # BASE DE DATOS — PostgreSQL
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: pegaso-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - pegaso-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # CACHE & BROKER — Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: pegaso-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - pegaso-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MEMORIA VECTORIAL — Qdrant
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pegaso-qdrant
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    networks:
      - pegaso-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'echo > /dev/tcp/localhost/6333' && echo ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # BUSCADOR PRIVADO — SearXNG
  # ============================================================
  searxng:
    image: searxng/searxng:latest
    container_name: pegaso-search
    volumes:
      - ./config/searxng:/etc/searxng
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - pegaso-net
    restart: unless-stopped

  # ============================================================
  # CORE API — FastAPI con network_mode: host
  # Accede a Fox en localhost:11436 directamente
  # Accede a DB/Redis/Qdrant en localhost:5432/6379/6333
  # ============================================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pegaso-api
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      VLLM_API_BASE: "http://localhost:11436/v1"
      QDRANT_HOST: "localhost"
      QDRANT_PORT: "6333"
      REDIS_URL: "redis://localhost:6379/0"
      SEARXNG_URL: "http://localhost:8081"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data/vault:/app/data/vault
      - ./data/digests:/app/data/digests
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ============================================================
  # WORKER CELERY — network_mode: host
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pegaso-worker
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      VLLM_API_BASE: "http://localhost:11436/v1"
      QDRANT_HOST: "localhost"
      REDIS_URL: "redis://localhost:6379/0"
    env_file:
      - .env
    command: celery -A src.worker.tasks worker --loglevel=info --concurrency=2 -Q default,indexing
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data/vault:/app/data/vault
      - ./data/digests:/app/data/digests
    restart: unless-stopped

  # ============================================================
  # CELERY BEAT — network_mode: host
  # ============================================================
  beat:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pegaso-beat
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    environment:
      VLLM_API_BASE: "http://localhost:11436/v1"
      REDIS_URL: "redis://localhost:6379/0"
    env_file:
      - .env
    command: celery -A src.worker.tasks beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    restart: unless-stopped

  # ============================================================
  # VAULT WATCHER — indexación incremental
  # ============================================================
  watcher:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pegaso-watcher
    network_mode: host
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      QDRANT_HOST: "localhost"
      REDIS_URL: "redis://localhost:6379/0"
    env_file:
      - .env
    command: python -m src.services.watcher
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data/vault:/app/data/vault
    restart: unless-stopped

  # ============================================================
  # INTERFAZ WEB — Open-WebUI
  # Conecta a la API via localhost:8080 (host network)
  # ============================================================
  ui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: pegaso-ui
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:8080/v1
      - OPENAI_API_KEY=local-pegaso
      - WEBUI_SECRET_KEY=${SECRET_KEY}
      - ENABLE_OLLAMA_API=false
    volumes:
      - ./data/open-webui:/app/backend/data
    networks:
      - pegaso-net
    restart: unless-stopped

  # ============================================================
  # CRON — Backups automáticos
  # ============================================================
  cron:
    build:
      context: .
      dockerfile: docker/cron/Dockerfile
    container_name: pegaso-cron
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pegaso-net
    depends_on:
      - db
      - qdrant
    restart: always
